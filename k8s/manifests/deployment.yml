apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: react-app

  template:
    metadata:
      labels:
        app: react-app

    spec:
      containers:
      - name: react-app
        image: arn:aws:ecr:us-east-1:584868043218:repository/react-app:latest

        ports:
        - containerPort: 80 